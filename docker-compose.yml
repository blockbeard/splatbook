services:
  splatbook:
    build: .
    container_name: splatbook
    ports:
      - '3000:3000'
    volumes:
      - splatbook-data:/data
    # Alias for the tailscale sidecar to reach this service unambiguously:
    # the tailnet node is also named "splatbook", and its search domain
    # shadows the bare compose service name from inside the sidecar.
    networks:
      default:
        aliases:
          - splatbook-app
    environment:
      - DATABASE_URL=/data/splatbook.db
      # ORIGIN must match the public URL or form actions will 403.
      # Override in a .env file next to this compose file on atlas.
      - ORIGIN=${ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Tailscale sidecar: joins the tailnet as its own node "splatbook" and
  # proxies HTTPS to the app over the compose network. State persists on a
  # named volume so the node keeps its identity across restarts. TS_AUTHKEY
  # is supplied via .env (never committed).
  tailscale:
    image: tailscale/tailscale:latest
    container_name: splatbook-tailscale
    hostname: splatbook
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--hostname=splatbook
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - splatbook
    restart: unless-stopped

volumes:
  splatbook-data:
  tailscale-state:
