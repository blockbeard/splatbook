<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Apply the theme before first paint to avoid a flash of the wrong scheme.
			// Mirrors $lib/theme: anything other than an explicit light/dark override
			// means "follow the OS".
			try {
				const pref = localStorage.getItem('theme');
				const dark =
					pref === 'dark' ||
					(pref !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
				if (dark) document.documentElement.classList.add('dark');
			} catch {
				/* no localStorage (privacy mode) — default to light */
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
