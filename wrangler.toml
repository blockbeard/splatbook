# Cloudflare Pages + D1 configuration for the public deployment (ADAPTER=cloudflare).
# The atlas/Docker deployment uses adapter-node and ignores this file entirely.
#
# Go-live steps (see docs/deployment.md for the full runbook):
#   1. npm i -D @sveltejs/adapter-cloudflare
#   2. wrangler d1 create splatbook   → paste the returned database_id below
#   3. wrangler d1 migrations apply splatbook            (applies drizzle/*.sql)
#   4. ADAPTER=cloudflare npm run build && wrangler pages deploy .svelte-kit/cloudflare

name = "splatbook"
compatibility_date = "2025-07-01"
pages_build_output_dir = ".svelte-kit/cloudflare"

# The SvelteKit app reaches this database through `platform.env.DB` at runtime.
[[d1_databases]]
binding = "DB"
database_name = "splatbook"
database_id = "REPLACE_AFTER_wrangler_d1_create"
# drizzle-kit writes SQLite migrations here; D1 speaks SQLite, so the same files apply.
migrations_dir = "drizzle"
